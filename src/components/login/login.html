<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1>Welcome Back!</h1>
            <p>Sign in to access your cart and products</p>
        </div>

        <!-- Error Message -->
        @if (errorMessage) {
            <div class="alert alert-error">
                <span>⚠️</span> {{ errorMessage }}
            </div>
        }

        <!-- Login Form -->
        <form action="" [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

            <div class="form-group" [class.invalid]="isFieldInvalid('email')">
            <label for="email">Email Address <span class="required">*</span></label>
            <input
              type="email"
              id="email"
              formControlName="email"
              placeholder="Enter your email"
              autocomplete="email"
            >
            @if (isFieldInvalid('email')) {
                <span class="error-message">{{ getFieldErrors('email') }}</span>
            }
            </div>

            <!-- Password Field -->
            <div class="form-group" [class.invalid]="isFieldInvalid('password')">
                <label for="password">Password <span class="required">*</span></label>
                <input
                  type="password"
                  id="password"
                  formControlName="password"
                  placeholder="Enter your password (min 6 characters)"
                  autocomplete="current-password"
                >
                @if (isFieldInvalid('password')) {
                    <span class="error-message">{{ getFieldErrors('password') }}</span>
                }
            </div>

            <!-- Submit Button -->
            <button
              type="submit"
              class="btn btn-primary"
              [disabled]="loginForm.invalid || isSubmitting"  
            >
            @if (isSubmitting) {
                <span class="btn-loading">
                    <span class="btn-spinner"></span>
                    Signing in...
                </span>
            } @else {
                <span>Sign In</span>
            }
            </button>
        </form>

        <!-- Footer -->
        <div class="login-footer">
            <p>Demo credentials: Any valid email + password (6+ chars)</p>
        </div>
    </div>
</div>
